<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人申請履歷導航</title>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        /* 這裡保留並優化了你截圖中的樣式 */
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* 網格佈局 */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        /* 按鈕樣式 */
        .btn-item {
            background-color: #fce4ec; /* 參考圖片的粉色 */
            border: none;
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-item:active {
            background-color: #f8bbd0;
            transform: scale(0.95);
        }

        .btn-item img {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
        }

        .btn-item p {
            margin: 0;
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>我的個人履歷</h2>
        
        <div class="btn-group">
            <div class="btn-item" onclick="sendLineMsg('查詢報名資訊')">
                <img src="https://cdn-icons-png.flaticon.com/512/2907/2907150.png" alt="icon">
                <p>報名資訊</p>
            </div>

            <div class="btn-item" onclick="sendLineMsg('查詢書審準備')">
                <img src="https://cdn-icons-png.flaticon.com/512/2991/2991108.png" alt="icon">
                <p>書審準備</p>
            </div>

            <div class="btn-item" onclick="sendLineMsg('預約面試時間')">
                <img src="https://cdn-icons-png.flaticon.com/512/2666/2666469.png" alt="icon">
                <p>預約面試</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化 LIFF
        // 注意：請務必將下方的 YOUR_LIFF_ID 替換成你在 LINE Developers 申請到的 ID
        liff.init({
            liffId: "2009758449-oAUHDY0Y" 
        }).then(() => {
            console.log("LIFF 初始化成功");
        }).catch((err) => {
            console.error("LIFF 初始化失敗", err);
        });

        // 2. 發送訊息的函數
        function sendLineMsg(messageText) {
            // 檢查是否在 LINE 環境內
            if (!liff.isInClient()) {
                alert("請從 LINE 官方帳號點開此連結喔！");
                return;
            }

            // 呼叫 API 幫使用者發送文字
            liff.sendMessages([
                {
                    type: 'text',
                    text: messageText
                }
            ]).then(() => {
                // 發送成功後自動關閉網頁，回到聊天室
                liff.closeWindow();
            }).catch((err) => {
                console.error("發送失敗", err);
            });
        }
    </script>

</body>
</html>
